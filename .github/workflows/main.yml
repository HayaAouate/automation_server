name: Build and Test

on:
  push:
    branches: [ "dev" ]

jobs:
  build-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      - name: build image
        run: docker build -t automation-server:latest .

      - name: Run container
        run: docker run -d -p 3000:3000 --name automation-server automation-server:latest

      - name: test curl
        run: curl -v http://localhost:3000/api

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: automation-server:latest
          ports: 
            - 3000:3000

      

      
  